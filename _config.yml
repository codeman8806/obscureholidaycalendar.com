# GitHub Pages runs this site through Jekyll by default, which silently
# drops dotfiles/dotfolders (like .well-known) unless explicitly included.
# This site itself isn't built with Jekyll features (it's static HTML
# generated by the Python scripts in this repo) — this file exists solely
# to stop Jekyll from excluding .well-known, which Android App Links (and
# similar well-known-URI standards) require being served as a real file.
include:
  - ".well-known"
