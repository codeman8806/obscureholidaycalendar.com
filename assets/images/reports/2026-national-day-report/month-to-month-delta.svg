<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="t d">
<title id="t">Month-to-month change in holiday counts</title>
<desc id="d">Diverging bars showing month-over-month count changes driven by month length.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
