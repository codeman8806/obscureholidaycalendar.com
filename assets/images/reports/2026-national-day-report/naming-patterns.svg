<svg xmlns="http://www.w3.org/2000/svg" width="780" height="460" viewBox="0 0 780 460" role="img" aria-labelledby="t d">
<title id="t">How observances are named</title>
<desc id="d">Donut chart showing 295 of 743 observances start with the word National, the largest naming pattern.</desc>
<defs>
  <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.18"/>
  </filter>
</defs>
<rect width="100%" height="100%" fill="#ffffff" rx="14"/>

<text x="24" y="34" font-family="Inter, Manrope, -apple-system, system-ui, sans-serif" font-size="16" font-weight="700" fill="#0f172a">How observances are named</text>
<circle cx="220" cy="240.0" r="150" fill="none" stroke="#2c005f" stroke-width="48" stroke-dasharray="374.20 942.48" stroke-dashoffset="0.00" transform="rotate(-90 220 240.0)"/>
<circle cx="220" cy="240.0" r="150" fill="none" stroke="#1c96f3" stroke-width="48" stroke-dasharray="494.71 942.48" stroke-dashoffset="-374.20" transform="rotate(-90 220 240.0)"/>
<circle cx="220" cy="240.0" r="150" fill="none" stroke="#22c55e" stroke-width="48" stroke-dasharray="38.05 942.48" stroke-dashoffset="-868.91" transform="rotate(-90 220 240.0)"/>
<circle cx="220" cy="240.0" r="150" fill="none" stroke="#e0902e" stroke-width="48" stroke-dasharray="35.52 942.48" stroke-dashoffset="-906.96" transform="rotate(-90 220 240.0)"/>
<text x="220" y="234.0" font-family="Inter, Manrope, -apple-system, system-ui, sans-serif" font-size="36" font-weight="800" text-anchor="middle" fill="#0f172a">743</text>
<text x="220" y="260.0" font-family="Inter, Manrope, -apple-system, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#475569">total observances</text>
<rect x="440" y="142.0" width="18" height="18" rx="5" fill="#2c005f"/>
<text x="468" y="156.0" font-family="Inter, Manrope, -apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Starts with “National”</text>
<text x="468" y="175.0" font-family="Inter, Manrope, -apple-system, system-ui, sans-serif" font-size="12.5" fill="#475569">295 observances (39.7%)</text>
<rect x="440" y="188.0" width="18" height="18" rx="5" fill="#1c96f3"/>
<text x="468" y="202.0" font-family="Inter, Manrope, -apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Plain name</text>
<text x="468" y="221.0" font-family="Inter, Manrope, -apple-system, system-ui, sans-serif" font-size="12.5" fill="#475569">390 observances (52.5%)</text>
<rect x="440" y="234.0" width="18" height="18" rx="5" fill="#22c55e"/>
<text x="468" y="248.0" font-family="Inter, Manrope, -apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Starts with “World”</text>
<text x="468" y="267.0" font-family="Inter, Manrope, -apple-system, system-ui, sans-serif" font-size="12.5" fill="#475569">30 observances (4.0%)</text>
<rect x="440" y="280.0" width="18" height="18" rx="5" fill="#e0902e"/>
<text x="468" y="294.0" font-family="Inter, Manrope, -apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Starts with “International”</text>
<text x="468" y="313.0" font-family="Inter, Manrope, -apple-system, system-ui, sans-serif" font-size="12.5" fill="#475569">28 observances (3.8%)</text>
</svg>